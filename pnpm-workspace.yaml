packages:
  - apps/**
  - packages/**

allowBuilds:
  '@swc/core': true
  core-js: true
  cypress: true
  esbuild: true
  nx: true
  unrs-resolver: true

# todo: pls remove temporary
minimumReleaseAgeExclude:
  - '@vitest/pretty-format@4.1.8'
  - '@vitest/ui@4.1.8'
  - '@vitest/utils@4.1.8'

onlyBuiltDependencies:
  - '@swc/core'
  - core-js
  - cypress
  - nx
  - unrs-resolver

sideEffectsCache: false
