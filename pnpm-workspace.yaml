packages:
  - 'apps/**'
  - 'packages/**'

allowBuilds:
  '@swc/core': true
  core-js: true
  cypress: true
  esbuild: true
  nx: true
  unrs-resolver: true

# todo: pls remove temporary
minimumReleaseAgeExclude:
  - '@mapcomponents/react-maplibre@1.8.20'

onlyBuiltDependencies:
  - '@swc/core'
  - core-js
  - cypress
  - nx
  - unrs-resolver

sideEffectsCache: false
